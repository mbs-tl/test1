<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyse IA vs Humain</title>

<!-- ✅ Scripts corrigés -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin: 15px auto;
  max-width: 900px;
}
button {
  background: #3b82f6;
  border: none;
  padding: 10px 15px;
  margin: 5px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
.metric { font-size: 20px; margin: 10px; }
.good { color: #22c55e; }
.bad { color: #ef4444; }
.mid { color: #f59e0b; }
</style>
</head>

<body>

<h1>🧠 Dashboard IA vs Humain</h1>

<div class="card">
  <input type="file" id="fileInput">
  <br><br>
  <input type="text" id="sheetURL" placeholder="Lien Google Sheet (CSV)">
  <button onclick="loadSheet()">Charger</button>
  <br><br>
  <button onclick="analyser()">🚀 Lancer analyse</button>
</div>

<div class="card" id="metrics"></div>

<div class="card">
  <canvas id="chart1"></canvas>
</div>

<div class="card">
  <canvas id="chart2"></canvas>
</div>

<script>

let data = [];
let chart1 = null;
let chart2 = null;

/* ✅ Lecture fichier */
document.getElementById("fileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = evt => {
    const wb = XLSX.read(evt.target.result, { type: "binary" });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    data = XLSX.utils.sheet_to_json(sheet);
    console.log(data);
    alert("✅ Fichier chargé !");
  };

  reader.readAsBinaryString(file);
});

/* ✅ Google Sheet */
function loadSheet() {
  const url = document.getElementById("sheetURL").value;

  fetch(url)
    .then(res => res.text())
    .then(csv => {
      const wb = XLSX.read(csv, { type: "string" });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      data = XLSX.utils.sheet_to_json(sheet);
      console.log(data);
      alert("✅ Sheet chargé !");
    });
}

/* ✅ util colonne robuste */
function get(row, keys) {
  for (let k of keys) {
    if (row[k] !== undefined) return row[k];
  }
  return null;
}

/* ✅ analyse */
function analyser() {

  if (!data || data.length === 0) {
    alert("⚠️ charge un fichier d'abord !");
    return;
  }

  let correct = 0;
  let total = data.length;
  let confInit = [];
  let confFinal = [];
  let changed = 0;

  data.forEach(row => {

    const vrai = get(row, ["Type Réél","Type Reel","Type"]);
    const jugement = get(row, ["Jugement d'a","Jugement","Decision"]);
    const premier = get(row, ["Premier Avis"]);
    const ci = get(row, ["Confiance Initiale"]);
    const cf = get(row, ["Confiance Finale"]);

    if (vrai && jugement && vrai == jugement) correct++;

    if (ci != null) confInit.push(Number(ci));
    if (cf != null) confFinal.push(Number(cf));

    if (premier && jugement && premier != jugement) changed++;
  });

  const acc = (correct / total * 100).toFixed(1);
  const meanInit = avg(confInit);
  const meanFinal = avg(confFinal);
  const changeRate = (changed / total * 100).toFixed(1);

  document.getElementById("metrics").innerHTML = `
    <div class="metric good">✅ Accuracy : ${acc}%</div>
    <div class="metric mid">📊 Confiance initiale : ${meanInit}</div>
    <div class="metric good">📈 Confiance finale : ${meanFinal}</div>
    <div class="metric bad">🔄 Changement d'avis : ${changeRate}%</div>
  `;

  drawCharts(confInit, confFinal);
}

/* ✅ moyenne */
function avg(arr) {
  if (arr.length === 0) return 0;
  return (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1);
}

/* ✅ charts corrigés */
function drawCharts(init, fin) {

  if (chart1) chart1.destroy();
  if (chart2) chart2.destroy();

  chart1 = new Chart(document.getElementById("chart1"), {
    type: "line",
    data: {
      labels: init.map((_,i)=>i),
      datasets: [
        {
          label: "Confiance initiale",
          data: init,
          borderColor: "#f59e0b"
        },
        {
          label: "Confiance finale",
          data: fin,
          borderColor: "#22c55e"
        }
      ]
    }
  });

  chart2 = new Chart(document.getElementById("chart2"), {
    type: "bar",
    data: {
      labels: ["Initiale", "Finale"],
      datasets: [{
        label: "Moyenne",
        data: [avg(init), avg(fin)],
        backgroundColor: ["#f59e0b","#22c55e"]
      }]
    }
  });
}

</script>

</body>
</html>
